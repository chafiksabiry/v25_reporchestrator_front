[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Registration backend — used for IP history / country mismatch (VITE_AUTH_API_URL fallback)
  VITE_API_URL = "https://v25registrationbackend-production.up.railway.app/api"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
