[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Registration backend — auth + IP history (/api/users/:id/ip-history)
  VITE_AUTH_API_URL = "https://v25registrationbackend-production.up.railway.app/api"
  VITE_API_URL = "https://v25registrationbackend-production.up.railway.app/api"
  # Reps wizard backend — profiles, onboarding, plans
  VITE_REP_API_URL = "https://v25repscreationwizardbackend-production-bdd2.up.railway.app/api"
  # Rep dashboard backend — profile video analysis (Gemini), /api/profiles/*
  VITE_REP_DASH_API_URL = "https://v25dashrepback-production.up.railway.app/api"
  # Gigs backend — active gigs, gig details (/api/gigs/*)
  VITE_BACKEND_URL_GIGS = "https://v25gigsmanualcreationbackend-production.up.railway.app/api"
  VITE_API_URL_GIGS = "https://v25gigsmanualcreationbackend-production.up.railway.app/api"
  # Matching backend — gig-agents enrollments/invitations (/api/gig-agents/*)
  VITE_MATCHING_API_URL = "https://v25matchingbackend-production.up.railway.app/api"
  # Training backend — training journeys/progress (no /api prefix)
  VITE_TRAINING_API_URL = "https://v25platformtrainingbackend-production.up.railway.app"
  VITE_TRAINING_BACKEND_URL = "https://v25platformtrainingbackend-production.up.railway.app"
  # Company dashboard backend — leads + zoho config (/api/leads, /api/zoho-config)
  VITE_DASH_COMPANY_BACKEND = "https://v25dashboardbackend-production.up.railway.app/api"
  VITE_DASHBOARD_COMPANY_API_URL = "https://v25dashboardbackend-production.up.railway.app/api"
  # Calls / Twilio backend — call records, Twilio token (/api/calls/*)
  VITE_CALLS_API_URL = "https://v25dashcallsbackend-production.up.railway.app/api"
  VITE_API_URL_CALL = "https://v25dashcallsbackend-production.up.railway.app/api"
  # Comporchestrator backend
  VITE_COMPORCHESTRATOR_BACK_URL = "https://v25comporchestratorback-production.up.railway.app/api"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
